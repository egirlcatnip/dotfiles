add_newline = false

[shell]
xonsh_indicator = "<@>"
fish_indicator = "<><"
style = "black bold"
format = "[$indicator]($style)"
disabled = false


[character]
success_symbol = "[ > ](bold green)"
error_symbol = "[ > ](bold red)"

[directory]
style = "blue bold"
truncation_length = 0

[package]
version_format = "${raw}"
format = "is [$version]($style) "
style = "maroon bold"

[git_branch]
always_show_remote = false
format = "on [$branch(:$remote_branch)]($style) "
style = "bold red"

[c]
commands = [['clang', '--version'], ['cc', '--version'], ['gcc', '--version']]
